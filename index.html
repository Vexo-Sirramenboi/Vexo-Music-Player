<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vexo Music Player</title>

<style>
  body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 50px;
  }

  h1 {
    margin-bottom: 20px;
  }

  input {
    width: 350px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
    font-size: 14px;
  }

  button {
    padding: 12px 18px;
    margin-left: 8px;
    border: none;
    border-radius: 10px;
    background: #ff0000;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #cc0000;
  }

  #status {
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
  }

  #player {
    margin-top: 30px;
    display: flex;
    justify-content: center;
  }
</style>
</head>

<body>

<h1>🎵 Vexo YouTube Player</h1>

<input id="ytLink" placeholder="Paste YouTube link here...">
<button onclick="playVideo()">Play</button>

<div id="status">Loading player...</div>

<div id="player"></div>

<!-- YouTube API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let ready = false;

// REQUIRED by YouTube API (must be global)
function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    height: '250',
    width: '420',
    videoId: '',
    events: {
      onReady: () => {
        ready = true;
        document.getElementById("status").innerText = "Ready 🎧 Paste a link!";
      }
    }
  });
}

// Extract video ID from ANY YouTube URL
function getVideoId(url) {
  try {
    const u = new URL(url);

    // normal watch link
    if (u.searchParams.get("v")) {
      return u.searchParams.get("v");
    }

    // short youtu.be link
    if (u.hostname.includes("youtu.be")) {
      return u.pathname.slice(1);
    }

    // embed link
    if (u.pathname.includes("/embed/")) {
      return u.pathname.split("/embed/")[1];
    }

    return null;
  } catch {
    return null;
  }
}

// Play video
function playVideo() {
  const url = document.getElementById("ytLink").value.trim();
  const id = getVideoId(url);

  if (!id) {
    document.getElementById("status").innerText = "❌ Invalid YouTube link";
    return;
  }

  if (!ready) {
    document.getElementById("status").innerText = "⏳ Player still loading...";
    return;
  }

  player.loadVideoById(id);
  document.getElementById("status").innerText = "▶️ Playing...";
}

// Press Enter to play
document.getElementById("ytLink").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    playVideo();
  }
});
</script>

</body>
</html>
